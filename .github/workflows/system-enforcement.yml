name: System Enforcement

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [ main ]

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Run rules guard
      run: |
        python scripts/rules_guard.py

    - name: Check formatting and linting
      run: |
        ruff format --check .
        ruff check .

    - name: Verify docs sync
      run: |
        python scripts/rules_audit.py
        make share.sync