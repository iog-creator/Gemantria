name: System Enforcement

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  policy-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt || true
      - name: Run rules guard
        run: python3 scripts/rules_guard.py
      - name: Ruff checks
        run: |
          ruff format --check .
          ruff check .
